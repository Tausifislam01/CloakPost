{% extends "base.html" %}
{% block content %}
<h2>Find Friends</h2>
<form method="get">
  <input type="text" name="q" placeholder="Search by username" value="{{ query }}">
  <button type="submit">Search</button>
</form>

{% if results %}
  <ul>
    {% for u in results %}
      <li>
        {{ u.username }}
        <form method="post" action="{% url 'send_friend_request' username=u.username %}" style="display:inline;">
          {% csrf_token %}
          <button type="submit">Send Friend Request</button>
        </form>
      </li>
    {% endfor %}
  </ul>
{% elif query %}
  <p>No users found.</p>
{% endif %}
{% endblock %}
