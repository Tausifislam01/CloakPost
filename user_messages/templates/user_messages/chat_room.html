{% extends "base.html" %}
{% block title %}Chat with {{ peer.username }} • CloakPost{% endblock %}

{% block content %}
<h2>Chat with {{ peer.username }}</h2>

<div id="log" style="height:40vh; overflow:auto; border:1px solid #ddd; padding:.5rem; margin-bottom:1rem;"></div>

<div style="display:flex; gap:.5rem;">
  <input id="msgInput" type="text" placeholder="Type a message…" style="flex:1;" />
  <button id="sendBtn" type="button" disabled>Send</button>
</div>

<script>
(function () {
  const log = document.getElementById("log");
  const msgInput = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");

  function addLine(text) {
    const d = document.createElement("div");
    d.textContent = text;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  function scheme() {
    return window.location.protocol === "https:" ? "wss" : "ws";
  }

  let socket = null;
  let retry = null;

  function connect() {
    socket = new WebSocket(`${scheme()}://${window.location.host}/ws/chat/{{ peer.id }}/`);
    socket.onopen = () => addLine("[Connected]");
    socket.onclose = () => {
      addLine("[Disconnected]");
      clearTimeout(retry);
      retry = setTimeout(connect, 1500);
    };
    socket.onerror = () => addLine("[Error]");
    socket.onmessage = (evt) => {
      try {
        const data = JSON.parse(evt.data);
        if (data.type === "chat.message") {
          addLine(`${data.sender_username}: ${data.plaintext}`);
        }
      } catch {
        addLine(evt.data);
      }
    };
  }

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !socket || socket.readyState !== 1) return;
    socket.send(JSON.stringify({ action: "send_message", content: text }));
    msgInput.value = "";
    sendBtn.disabled = true;
  }

  msgInput.addEventListener("input", () => { sendBtn.disabled = !msgInput.value.trim(); });
  msgInput.addEventListener("keyup", (e) => { if (e.key === "Enter") sendMessage(); });
  sendBtn.addEventListener("click", sendMessage);

  connect();
})();
</script>
{% endblock %}
